# Detekt configuration for the fluent-kt build.
# Loaded with buildUponDefaultConfig = true, so this file only overrides the
# rules we want to tune. The ktlint rule set is contributed by the
# detekt-rules-ktlint-wrapper plugin (applied to every subproject) and runs
# alongside the standard detekt rules.
#
# See https://detekt.dev/docs/rules/ for the full default configuration.

config:
  validation: true
  warningsAsErrors: true
  checkExhaustiveness: false

complexity:
  LongMethod:
    allowedLines: 60
  LongParameterList:
    allowedFunctionParameters: 6
    allowedConstructorParameters: 6
  TooManyFunctions:
    allowedFunctionsPerFile: 15
    allowedFunctionsPerClass: 15
    allowedFunctionsPerInterface: 15
    allowedFunctionsPerObject: 15
    allowedFunctionsPerEnum: 15

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'

style:
  MagicNumber:
    active: false
  ReturnCount:
    max: 4

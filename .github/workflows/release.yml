name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0). Leave blank to use the tag.'
        required: false

# Cancel in-progress release runs for the same tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Resolve version: tag pushes use the tag's `v`-stripped version;
      # manual dispatches accept a version override, defaulting to
      # 0.1.0-SNAPSHOT (throwaway) so re-runs during pipeline testing
      # land in the snapshot staging repo, not as a real release.
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="0.1.0-SNAPSHOT"
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"

      # The vanniktech plugin reads Gradle project properties via the
      # ORG_GRADLE_PROJECT_<name> env-var convention. Map our GitHub
      # Actions secrets (which we want to keep human-readable) into
      # the plugin's expected names.
      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_VERSION_NAME: ${{ steps.version.outputs.version }}
        run: ./gradlew publishToMavenCentral --no-build-cache

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            *.md

name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch on new pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: verify (jvm + linuxX64, detekt)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # gradle/actions/setup-gradle handles Gradle download, the
      # wrapper-jar cache, and the build cache automatically — no need
      # for a separate actions/cache step. See
      # https://github.com/gradle/actions/blob/main/docs/setup-gradle.md
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run detekt
        run: ./gradlew detektAll --no-build-cache

      - name: Run JVM tests
        run: ./gradlew jvmTest --no-build-cache

      - name: Run LinuxX64 (Kotlin/Native) tests
        run: ./gradlew linuxX64Test --no-build-cache

  android:
    name: verify (Android compose + example)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Assemble fluent-compose + example
        run: ./gradlew :fluent-compose:assembleDebug :examples:android-compose:assembleDebug --no-build-cache

      - name: Run fluent-compose unit tests
        run: ./gradlew :fluent-compose:testDebugUnitTest --no-build-cache
